sonar.projectKey=Mainao_whatsbotheringyou
sonar.organization=mainao
sonar.projectName=WhatsBotheringYou
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.config.*,src/test/**,src/app/layout.tsx,src/app/globals.css

sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Exclude files from coverage that are not testable
sonar.coverage.exclusions=\
  src/app/layout.tsx,\
  src/app/globals.css,\
  src/app/loading.tsx,\
  src/app/not-found.tsx,\
  src/components/universe/UniverseCanvas.module.css,\
  **/*.config.*,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.config.*,\
  src/test/**